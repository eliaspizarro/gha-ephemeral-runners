name: Build, Push and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Update version files
      run: |
        VERSION=${{ github.ref_name }}        # v1.1.2
        CLEAN_VERSION=${VERSION#v}            # 1.1.2
        echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
        cd api-gateway/scripts && ./versioning.sh $CLEAN_VERSION
        cd ../../orchestrator/scripts && ./versioning.sh $CLEAN_VERSION

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.REGISTRY }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and push orchestrator image
      uses: docker/build-push-action@v6
      with:
        context: orchestrator
        file: orchestrator/docker/Dockerfile
        build-args: |
          REGISTRY=${{ vars.REGISTRY }}
          IMAGE_VERSION=${{ env.CLEAN_VERSION }}
        push: true
        tags: |
          ${{ vars.REGISTRY }}/gha-orchestrator:latest
          ${{ vars.REGISTRY }}/gha-orchestrator:${{ env.CLEAN_VERSION }}
        platforms: linux/amd64
        provenance: false
        sbom: false

    - name: Build and push api-gateway image
      uses: docker/build-push-action@v6
      with:
        context: api-gateway
        file: api-gateway/docker/Dockerfile
        build-args: |
          REGISTRY=${{ vars.REGISTRY }}
          IMAGE_VERSION=${{ env.CLEAN_VERSION }}
        push: true
        tags: |
          ${{ vars.REGISTRY }}/gha-api-gateway:latest
          ${{ vars.REGISTRY }}/gha-api-gateway:${{ env.CLEAN_VERSION }}
        platforms: linux/amd64
        provenance: false
        sbom: false

    - name: Verify orchestrator image exists
      run: |
        docker pull ${{ vars.REGISTRY }}/gha-orchestrator:${{ env.CLEAN_VERSION }} && echo "Image exists" || (echo "Image not found" && exit 1)

    - name: Verify api-gateway image exists
      run: |
        docker pull ${{ vars.REGISTRY }}/gha-api-gateway:${{ env.CLEAN_VERSION }} && echo "Image exists" || (echo "Image not found" && exit 1)

    - name: Generate changelog
      id: changelog
      uses: requarks/changelog-action@v1
      continue-on-error: true
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.ref_name }}
        excludeTypes: 'chore,docs,style,refactor,test,build'
        writeToFile: false
        includeInvalidCommits: true

    - name: Create fallback changelog
      id: fallback
      if: steps.changelog.outcome == 'failure' || steps.changelog.outputs.changes == ''
      run: |
        # Obtener el tag anterior automáticamente
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v1.0.0")
        echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
        echo "changes=No hay cambios convencionales desde la última versión. Ver todos los commits en [Comparación](https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }})" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## 🚀 Release ${{ github.ref_name }}

          ### 📋 Cambios

          ${{ steps.changelog.outputs.changes || steps.fallback.outputs.changes }}
        draft: false
        prerelease: false
